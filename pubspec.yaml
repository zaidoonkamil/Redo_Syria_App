name: rido_syria_app
description: "A new Flutter project."
version: 1.0.0+2

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio:
  shared_preferences:
  flutter_bloc:
  bloc:
  fluttertoast: ^8.2.1
  conditional_builder_null_safety:
  carousel_slider: ^5.0.0
  buttons_tabbar: ^1.3.10
  url_launcher:
  intl:
  image_picker:
  http_parser: ^4.0.2
  top_snackbar_flutter: ^3.2.0
  onesignal_flutter: ^5.3.4
  fw_tab_bar: ^0.0.3
  google_nav_bar: ^5.0.7

  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  socket_io_client: ^3.0.2
  flutter_polyline_points: ^2.1.0

  font_awesome_flutter: ^10.9.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  awesome_snackbar_content: ^0.1.5
  iconsax: ^0.0.8
  map_launcher: ^3.5.0
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

  fonts:
    - family: cairo
      fonts:
        - asset: assets/fonts/Cairo/static/Cairo-Bold.ttf
